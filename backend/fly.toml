# fly.toml — Configuración de despliegue del BACKEND (PHP) en Fly.io
# Coloca este archivo en la raíz de la carpeta backend/ antes de hacer deploy.

app = "spacebook-backend"   # <-- Cambia esto por el nombre que elijas en fly.io
primary_region = "mia"      # Miami es la región más cercana a México; también puedes usar "dfw" (Dallas)

[build]
  # Usa la imagen oficial de PHP con Apache incluido
  image = "php:8.2-apache"

[deploy]
  strategy = "immediate"

[[services]]
  internal_port = 80        # ← Apache escucha en 80
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
